<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HLS Live Test</title>
    <style>
        body { background: #111; color: #eee; font-family: Arial; text-align: center; padding: 20px; }
        video { max-width: 90%; border: 2px solid #4caf50; margin: 20px 0; }
        .info { background: #222; padding: 15px; border-radius: 8px; display: inline-block; }
        a { color: #8bc34a; }
    </style>
</head>
<body>
    <h2>🎬 Тест HLS потока</h2>
    <video id="video" controls autoplay muted loop width="800"></video>
    <div class="info">
        <p>Поток: <a href="./index.m3u8" target="_blank">index.m3u8</a></p>
        <p>Статус: <span id="status">Загрузка...</span></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const streamUrl = './index.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls({ liveSyncDurationCount: 3 });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                status.textContent = 'Активен (live)';
                video.play();
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                status.textContent = 'Ошибка: ' + data.details;
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            status.textContent = 'Нативный HLS';
        } else {
            status.textContent = 'Браузер не поддерживает HLS';
        }
    </script>
</body>
</html>
